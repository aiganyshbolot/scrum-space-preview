name: expire-preview
on:
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pages: write
jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove content after expiry
        run: |
          NOW=$(date -u +%s); EXP=1783354828
          echo "now=$NOW exp=$EXP"
          if [ "$NOW" -ge "$EXP" ]; then
            printf '%s' '<!doctype html><meta charset=utf-8><title>Срок истёк</title><body style="background:#040b07;color:#9db3a2;font-family:system-ui;display:grid;place-items:center;height:100vh;margin:0"><p>Срок предпросмотра истёк.</p></body>' > index.html
            git config user.name "expiry-bot"; git config user.email "expiry@users.noreply.github.com"
            git add index.html && git commit -m "chore: preview expired" || echo "no change"
            git push
            curl -s -X DELETE -H "Authorization: Bearer ${{ github.token }}" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${{ github.repository }}/pages" || true
            echo "EXPIRED — content removed"
          else
            echo "not expired yet"
          fi
