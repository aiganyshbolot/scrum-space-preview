<!doctype html><html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scrum Space — доступ</title>
<style>
:root{--bg:#040b07;--card:#0f1f14;--line:#24382c;--text:#e9e5d6;--dim:#9db3a2;--acc:#cfc3a2;--acc2:#8fb89e;--red:#d98a7d}
*{box-sizing:border-box;margin:0}html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:"Golos Text",system-ui,sans-serif;
display:flex;align-items:center;justify-content:center;padding:24px}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(60vw 60vw at 15% 10%,#12432c55,transparent 70%),radial-gradient(50vw 50vw at 85% 90%,#1b3a3f55,transparent 70%)}
.box{position:relative;width:min(420px,92vw);background:var(--card);border:1px solid var(--line);
border-radius:18px;padding:34px 30px;text-align:center}
.k{font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--acc);margin-bottom:14px}
h1{font-family:"Playfair Display",Georgia,serif;font-weight:800;font-size:30px;margin-bottom:6px}
p{color:var(--dim);font-size:14px;line-height:1.5;margin-bottom:20px}
input{width:100%;padding:13px 15px;border-radius:12px;border:1px solid var(--line);background:#08130c;
color:var(--text);font-size:16px;font-family:inherit;text-align:center;letter-spacing:.04em}
input:focus{outline:none;border-color:var(--acc2)}
button{margin-top:12px;width:100%;padding:13px;border-radius:100px;border:none;background:var(--acc);
color:#04120a;font-family:"JetBrains Mono",monospace;font-size:14px;letter-spacing:.06em;cursor:pointer}
button:hover{filter:brightness(1.06)}
.err{color:var(--red);font-size:13px;margin-top:12px;min-height:18px;font-family:"JetBrains Mono",monospace}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Golos+Text:wght@400;500&family=JetBrains+Mono&display=swap&subset=cyrillic,latin" rel="stylesheet">
</head><body>
<form class="box" id="f">
<div class="k">Материал рабочей встречи</div>
<h1>Scrum Space</h1>
<p>Предпросмотр защищён паролем.<br>Введите пароль для доступа.</p>
<input id="pw" type="password" placeholder="пароль" autocomplete="off" autofocus>
<button type="submit">Открыть</button>
<div class="err" id="e"></div>
</form>

const b2u=b=>Uint8Array.from(atob(b),c=>c.charCodeAt(0));
async function dec(pw){
 const raw=b2u(ENC), salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
 const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
 const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
 const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
 return new TextDecoder().decode(pt);
}

 try{const html=await dec(document.getElementById("pw").value);
   document.open();document.write(html);document.close();
 }catch(_){er.textContent="Неверный пароль";}
});
